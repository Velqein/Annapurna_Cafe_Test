<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Annapurna Kitchen</title>
  <script>
    // GitHub Pages SPA redirect trick
    // When GH Pages 404s on a deep link, this file is served.
    // It encodes the target path into the query string then redirects
    // to index.html where the handler below decodes it back.
    var pathSegmentsToKeep = 1; // 1 = keep the repo-name segment (/velqein.com)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/')
        .replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
